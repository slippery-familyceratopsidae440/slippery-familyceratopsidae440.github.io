name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          A2BE09: ${{ secrets.A2BE09 }}
          B3A023: ${{ secrets.B3A023 }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A2BE09', '')
          env_b = os.environ.get('B3A023', '')
          modified = 0
          for doc in pathlib.Path('_site').rglob('*.html'):
              try:
                  body = doc.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = body
              if env_a:
                  result = result.replace('<!-- 8f2550c1a7031a46a26b7ba0c4 -->', env_a)
              if env_b:
                  result = result.replace('<!-- 0a31a979fe3077212cc5679c4ee4d3eb4772f9eb2b0270 -->', env_b)
              if result != body:
                  doc.write_text(result, encoding='utf-8')
                  modified += 1
          if modified == 0 and (env_a or env_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
